name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Docker Compose config
        run: docker compose --env-file infrastructure/.env.example -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.dev.yml config --quiet

      - name: Run quality gate (phase 1)
        run: node infrastructure/scripts/quality-gate.mjs --phase=1 --task=ci

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: reports/quality-gate/
          if-no-files-found: ignore
